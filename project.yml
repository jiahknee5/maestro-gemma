name: MaestroGemma
options:
  bundleIdPrefix: com.johnnychung
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: 6LYXW8XMJB
    PRODUCT_BUNDLE_IDENTIFIER: com.johnnychung.maestrogemma
    CODE_SIGN_STYLE: Automatic

targets:
  MaestroGemma:
    type: application
    platform: iOS
    sources:
      - MaestroGemma
    resources:
      - path: MaestroGemma/Resources
    info:
      path: MaestroGemma/Info.plist
      properties:
        CFBundleName: Maestro Gemma
        CFBundleDisplayName: Maestro Gemma
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "Maestro Gemma uses the camera to analyze your posture while you practice."
        NSMicrophoneUsageDescription: "Maestro Gemma uses the microphone to detect the pitch of the notes you play."
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
    dependencies:
      - framework: cactus-sdk/apple/cactus-ios.xcframework
        embed: true
    settings:
      base:
        OTHER_LDFLAGS: "-ObjC"
